<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title data-i18n="title"></title>
<style>
body { font-family: Arial; max-width: 600px; margin: 30px auto; padding: 0 15px; background:#f4f4f4; }
h1 { color:#333; }
.row { display:flex; gap:6px; margin-bottom:10px; }
.row input, .row select, .row button { padding: 6px; font-size:14px; }
ul { list-style:none; padding:0; }
li { background:white; padding:8px; margin-bottom:4px; display:flex; align-items:center; gap:8px; border:1px solid #ccc; }
li.done span.t { text-decoration: line-through; color:#888; }
.prio1 { border-left:4px solid red; }
.prio2 { border-left:4px solid orange; }
.prio3 { border-left:4px solid green; }
button.del { margin-left:auto; background:#c33; color:white; border:0; padding:4px 8px; cursor:pointer; }
.stats { color:#555; font-size:13px; margin-top:10px; }
</style>
</head>
<body>
<h1 data-i18n="heading"></h1>

<div class="row">
  <input id="t" data-i18n-placeholder="placeholder" style="flex:1">
  <select id="pr">
    <option value="1" data-i18n="prio.high"></option>
    <option value="2" selected data-i18n="prio.medium"></option>
    <option value="3" data-i18n="prio.low"></option>
  </select>
  <button onclick="add()" data-i18n="add"></button>
</div>

<div class="row">
  <label data-i18n="filter.label"></label>
  <select id="f" onchange="load()">
    <option value="all" data-i18n="filter.all"></option>
    <option value="pending" data-i18n="filter.pending"></option>
    <option value="done" data-i18n="filter.done"></option>
  </select>
</div>

<ul id="list"></ul>
<div class="stats" id="stats"></div>

<script>
var API = ""

var SUPPORTED = ["es", "en", "pt"]
var lang = (navigator.language || "en").slice(0, 2)
if (!SUPPORTED.includes(lang)) lang = "en"

var t = {}

function interpolate(template, vars) {
  return template.replace(/\{(\w+)\}/g, function(_, key) { return vars[key] !== undefined ? vars[key] : "" })
}

function applyTranslations() {
  document.querySelectorAll("[data-i18n]").forEach(function(el) {
    var key = el.getAttribute("data-i18n")
    if (t[key] !== undefined) el.textContent = t[key]
  })
  document.querySelectorAll("[data-i18n-placeholder]").forEach(function(el) {
    var key = el.getAttribute("data-i18n-placeholder")
    if (t[key] !== undefined) el.placeholder = t[key]
  })
}

function load(){
  var f = document.getElementById("f").value
  var url = API + "/api/tasks"
  if (f !== "all") url += "?filter=" + f
  fetch(url).then(function(r){ return r.json() }).then(function(arr){
    var ul = document.getElementById("list")
    ul.innerHTML = ""
    for (var i = 0; i < arr.length; i++){
      var task = arr[i]
      var done = task.status === "d"
      var li = document.createElement("li")
      li.className = "prio" + task.priority + (done ? " done" : "")

      var cb = document.createElement("input")
      cb.type = "checkbox"
      cb.checked = done
      cb.onclick = (function(id, wasDone) {
        return function() { toggle(id, !wasDone) }
      })(task.id, done)

      var span = document.createElement("span")
      span.className = "t"
      span.textContent = task.title

      var btn = document.createElement("button")
      btn.className = "del"
      btn.textContent = t["del"] || "x"
      btn.onclick = (function(id) {
        return function() { del(id) }
      })(task.id)

      li.appendChild(cb)
      li.appendChild(span)
      li.appendChild(btn)
      ul.appendChild(li)
    }
  })
  fetch(API + "/api/stats").then(function(r){ return r.json() }).then(function(s){
    document.getElementById("stats").textContent = interpolate(t.stats || "", { pending: s.pending, done: s.done, total: s.total })
  })
}

function add(){
  var title = document.getElementById("t").value
  var pr = parseInt(document.getElementById("pr").value)
  fetch(API + "/api/tasks", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({title: title, priority: pr})
  }).then(function(){
    document.getElementById("t").value = ""
    load()
  })
}

function toggle(id, makeDone){
  fetch(API + "/api/tasks/" + id, {
    method: "PATCH",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({status: makeDone ? "d" : "p"})
  }).then(function(){ load() })
}

function del(id){
  fetch(API + "/api/tasks/" + id, {method:"DELETE"}).then(function(){ load() })
}

fetch("/locales/" + lang + ".json")
  .then(function(r){ return r.json() })
  .then(function(data){
    t = data
    applyTranslations()
    load()
  })
</script>
</body>
</html>
